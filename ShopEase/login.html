<!DOCTYPE html>
<html>
<head>
    <title>Login - ShopEase</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>ShopEase</h2>
    </div>
    <nav>
        <a href="index.html" id="home">Home</a>
        <a href="products.html" id="products">Products</a>
        <a href="cart.html" id="cart">Cart</a>
        <a href="wishlist.html" id="wishlist">Wishlist</a>
        <a href="about.html" id="about">About</a>
        <a href="contact.html" id="contact">Contact</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="signup.html" id="signupLink">Signup</a>
        <a href="#" onclick="logout()" id="logoutLink" style="display:none;">Logout</a>
    </nav>
</header>

<div class="section">
    <h2>Login</h2>

    <form onsubmit="return loginUser()">
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
</div>

<script>
function loginUser(){
    let email = document.getElementById("email").value;
    let user = localStorage.getItem("user");

    if(email === user){
        alert("Login successful");
        window.location = "index.html";
    } else {
        alert("Invalid Login");
    }
    return false;
}
</script>

<footer>© 2026 ShopEase</footer>
<script src="js/script.js"></script>
</body>
</html>
